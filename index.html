<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ariel Unidas Atacado | Estoque de Veículos</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Ícones do Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            background-color: #f8f9fa; 
            font-family: 'Inter', sans-serif; 
            color: #212529;
        }
        
        /* Cabeçalho Premium */
        .header-premium {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-bottom: 4px solid #3b82f6;
            padding: 2.5rem 0;
        }
        .header-title {
            font-weight: 800;
            letter-spacing: -1px;
            color: #ffffff;
            text-transform: uppercase;
        }
        .btn-whatsapp-header {
            background-color: #25d366;
            color: white;
            font-weight: 600;
            border-radius: 50px;
            padding: 8px 24px;
            transition: all 0.3s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }
        .btn-whatsapp-header:hover {
            background-color: #20ba59;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(37, 211, 102, 0.4);
        }

        /* Seção de Filtros */
        .card-filtros {
            background: #ffffff;
            border-radius: 16px;
            border: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            margin-top: -20px;
            z-index: 10;
            position: relative;
        }
        .btn-filtro {
            border-radius: 10px;
            padding: 8px 20px;
            font-weight: 600;
            font-size: 0.9rem;
            margin: 4px;
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            color: #64748b;
        }
        .btn-filtro:hover {
            background-color: #f1f5f9;
            color: #334155;
            border-color: #cbd5e1;
        }
        .btn-filtro.active {
            background-color: #3b82f6!important;
            color: white!important;
            border-color: #3b82f6!important;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* Cards dos Carros */
        .card-carro { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: none; 
            border-radius: 16px; 
            overflow: hidden; 
            min-height: 100%; 
            background: #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        .card-carro:hover { 
            transform: translateY(-6px); 
            box-shadow: 0 12px 25px rgba(15, 23, 42, 0.12)!important; 
        }
        .img-carro { 
            height: 220px; 
            object-fit: cover; 
            background-color: #f1f5f9; 
        }
        
        /* Badges Modernas */
        .badge-status { 
            position: absolute; 
            top: 16px; 
            left: 16px; 
            font-size: 0.75rem; 
            letter-spacing: 0.5px;
            padding: 6px 14px; 
            border-radius: 30px; 
            font-weight: 700; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
            z-index: 2; 
        }
        .badge-novidade { 
            position: absolute; 
            top: 16px; 
            right: 16px; 
            font-size: 0.75rem; 
            letter-spacing: 0.5px;
            padding: 6px 14px; 
            border-radius: 30px; 
            font-weight: 700; 
            background: linear-gradient(45deg, #f59e0b, #d97706);
            color: white; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
            z-index: 2; 
        }
        .status-disponivel { background-color: #10b981; color: white; }
        .status-vendido { background-color: #ef4444; color: white; }
        
        .card-vendido { opacity: 0.65; }
        .card-vendido .img-carro { filter: grayscale(100%); }
        
        /* Detalhes Técnicos */
        .car-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.3px;
        }
        .preco-tag { 
            color: #1e3a8a; 
            font-weight: 800; 
            font-size: 1.65rem; 
            letter-spacing: -0.5px;
        }
        .detalhe-item { 
            font-size: 0.88rem; 
            color: #475569; 
            margin-bottom: 6px; 
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .detalhe-item i {
            color: #94a3b8;
            font-size: 1rem;
        }
        .margem-destaque {
            background-color: #f0fdf4;
            color: #16a34a;
            padding: 2px 8px;
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <!-- Cabeçalho Principal -->
    <header class="header-premium text-center">
        <div class="container">
            <h1 class="header-title display-5 mb-2">Ariel Unidas Atacado</h1>
            <p class="text-blue-200 text-muted mb-3 fw-medium">Repasse e Estoque de Veículos em Tempo Real</p>
            <a href="https://wa.me/5551986597751" target="_blank" class="btn-whatsapp-header">
                <i class="bi bi-whatsapp"></i> (51) 98659-7751
            </a>
        </div>
    </header>

    <!-- Seção de Filtros -->
    <div class="container mb-5">
        <div class="card card-filtros p-3 border-0">
            <div class="d-flex flex-wrap justify-content-center justify-content-md-start align-items-center">
                <button class="btn btn-filtro active" onclick="filtrar('todos', this)">📊 Todos</button>
                <button class="btn btn-filtro" onclick="filtrar('novidades', this)">✨ Novidades</button>
                <button class="btn btn-filtro" onclick="ordenarPorMargem(this)">💰 Melhor Margem</button>
                <div class="vr mx-2 my-1 d-none d-md-block" style="height: 25px; background-color: #cbd5e1;"></div>
                <button class="btn btn-filtro" onclick="filtrar('hatch', this)">🚗 Hatch</button>
                <button class="btn btn-filtro" onclick="filtrar('sedan', this)">🚘 Sedan</button>
                <button class="btn btn-filtro" onclick="filtrar('suv', this)">🚙 SUV</button>
            </div>
        </div>
    </div>

    <!-- Grid de Veículos -->
    <div class="container mb-5">
        <div id="lista-carros" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            <div class="text-center w-100 my-5">
                <div class="spinner-border text-primary" role="status"></div>
                <h4 class="mt-3 text-muted">Acessando banco de dados seguro...</h4>
            </div>
        </div>
    </div>

    <script>
        const urlPlanilha = 'https://docs.google.com/spreadsheets/d/1xzN1JBC-5Li7csrGOTDq_wADj0AOAafVfCtVYeo99eI/export?format=csv&gid=0';
        let todosOsCarros = []; 

        function identificarCarroceria(modelo) {
            const mod = modelo.toLowerCase();
            const hatches = ['onix', 'gol', 'hb20', 'uno', 'palio', 'sandero', 'ka', 'argo', 'polo', 'mobi', 'up', 'fiesta', 'fox', 'clio', 'c3', '208'];
            const sedans = ['corolla', 'civic', 'prisma', 'sentra', 'cronos', 'logan', 'virtus', 'voyage', 'city', 'versa', 'siena', 'etios', 'cruze', 'jetta'];
            const suvs = ['compass', 'creta', 'renegade', 'kicks', 'tracker', 'hr-v', 'duster', 't-cross', 'nivus', 'pulse', 'fastback', 'ix35', 'sportage', 'asx', 'captur'];

            if (hatches.some(h => mod.includes(h))) return 'hatch';
            if (sedans.some(s => mod.includes(s))) return 'sedan';
            if (suvs.some(suv => mod.includes(suv))) return 'suv';
            return 'outros';
        }

        async function carregarEstoque() {
            try {
                const resposta = await fetch(urlPlanilha + '&nocache=' + new Date().getTime());
                if (!resposta.ok) throw new Error();
                
                const textoCsv = await resposta.text();
                
                const linhas = textoCsv.split(/\r?\n/).map(linha => {
                    return lineSplitter(linha);
                });
                
                if (linhas.length > 0) linhas.shift(); 
                
                let disponiveis = [];
                let vendidos = [];

                linhas.forEach(linha => {
                    if (!linha || linha.length < 2 || !linha[1] || linha[1] === "") return; 

                    const textoStatusColunaH = linha[7] ? linha[7].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : 'disponivel';
                    const textoColunaI = linha[8] ? linha[8].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : '';
                    const ehNovidade = textoStatusColunaH.includes('novidade') || textoColunaI.includes('novidade');

                    const carro = {
                        placa: linha[0] ? '*****' + linha[0].trim().slice(-2) : 'N/I',
                        modelo: engineTratarModelo(linha[1]),
                        cor: linha[2] || 'Não informada',
                        km: AppendingKM(linha[3]),
                        fipe: linha[4] || 'N/A',
                        valor: linha[5] || 'Consulte',
                        margem: linha[6] || 'N/I',
                        status: textoStatusColunaH,
                        foto: (linha[8] && linha[8].includes('drive.google.com')) 
                            ? 'https://lh3.googleusercontent.com/d/' + (linha[8].includes('id=') ? linha[8].split('id=')[1].split('&')[0] : linha[8].split('/d/')[1].split('/')[0])
                            : (linha[8] || ''),
                        carroceria: identificarCarroceria(linha[1]),
                        novidade: ehNovidade
                    };

                    if (carro.status.includes('vendido')) {
                        vendidos.push(carro);
                    } else {
                        disponiveis.push(carro);
                    }
                });

                todosOsCarros = [...disponiveis, ...vendidos];
                renderizarCards(todosOsCarros);

            } catch (erro) {
                document.getElementById('lista-carros').innerHTML = `
                    <div class="text-center w-100 my-5 text-danger">
                        <i class="bi bi-exclamation-triangle display-4"></i>
                        <h3 class="mt-3">Erro ao conectar com a planilha</h3>
                        <p>Verifique se o compartilhamento web do Google Sheets continua ativado.</p>
                    </div>`;
            }
        }

        function lineSplitter(linha) {
            return linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(campo => campo.replace(/^"|"$/g, '').trim());
        }

        function engineTratarModelo(txt) {
            if(!txt) return 'N/I';
            return txt.replace(/novidade/i, '').replace(/hatch/i, '').replace(/sedan/i, '').replace(/suv/i, '').trim();
        }

        function AppendingKM(valor) {
            if(!valor || valor === 'N/I') return 'N/I';
            if(String(valor).toLowerCase().includes('km')) return valor;
            return valor + ' KM';
        }

        function renderizarCards(lista) {
            const container = document.getElementById('lista-carros');
            container.innerHTML = '';

            if(lista.length === 0) {
                container.innerHTML = '<div class="text-center w-100 my-5 text-muted"><i class="bi bi-search display-5"></i><h4 class="mt-2">Nenhum veículo nesta categoria.</h4></div>';
                return;
            }

            lista.forEach(carro => {
                const esVendido = carro.status.includes('vendido');
                const classeStatus = esVendido ? 'status-vendido' : 'status-disponivel';
                const classeCard = esVendido ? 'card-vendido' : '';
                const textoStatus = esVendido ? 'VENDIDO' : 'DISPONÍVEL';
                
                const fotoUrl = (carro.foto && carro.foto.startsWith('http')) ? carro.foto : 'https://placehold.co/600x400/0f172a/ffffff?text=' + encodeURIComponent(carro.modelo.split(' ')[0]);
                const badgeNovidadeHtml = (carro.novidade && !esVendido) ? `<span class="badge badge-novidade"><i class="bi bi-stars"></i> NOVIDADE</span>` : '';

                const cardHtml = `
                    <div class="col">
                        <div class="card card-carro ${classeCard} position-relative">
                            <span class="badge badge-status ${classeStatus}">${textoStatus}</span>
                            ${badgeNovidadeHtml}
                            <img src="${fotoUrl}" class="card-img-top img-carro" alt="${carro.modelo}">
                            <div class="card-body p-4 d-flex flex-column justify-content-between">
                                <div>
                                    <h5 class="car-title mb-3">${carro.modelo}</h5>
                                    <div class="mb-4">
                                        <div class="detalhe-item"><i class="bi bi-hash"></i> <span><strong>Placa:</strong> ${carro.placa}</span></div>
                                        <div class="detalhe-item"><i class="bi bi-palette"></i> <span><strong>Cor:</strong> ${carro.cor} | <strong>KM:</strong> ${carro.km}</span></div>
                                        <div class="detalhe-item"><i class="bi bi-graph-up-arrow"></i> <span><strong>Margem:</strong> <span class="margem-destaque fw-bold">${carro.margem}</span></span></div>
                                        <div class="detalhe-item"><i class="bi bi-journal-text"></i> <span class="text-muted"><small>FIPE: ${carro.fipe}</small></span></div>
                                    </div>
                                </div>
                                <div class="border-top pt-3 d-flex justify-content-between align-items-center">
                                    <span class="small text-muted fw-bold">VALOR REPASSE:</span>
                                    <span class="preco-tag">${carro.valor}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        function filtrar(tipo, botao) {
            marcarBotaoAtivo(botao);
            if (tipo === 'todos') {
                renderizarCards(todosOsCarros);
            } else if (tipo === 'novidades') {
                const filtrados = todosOsCarros.filter(c => c.novidade && !c.status.includes('vendido'));
                renderizarCards(filtrados);
            } else {
                const filtrados = todosOsCarros.filter(c => c.carroceria === tipo);
                renderizarCards(filtrados);
            }
        }

        function ordenarPorMargem(botao) {
            marcarBotaoAtivo(botao);
            const limparValor = (texto) => {
                if (!texto || texto === 'N/I') return 0;
                let limpo = texto.replace(/[^\d,.-]/g, '').replace(/\./g, '').replace(',', '.');
                return parseFloat(limpo) || 0;
            };
            const ordenadosPuraMargem = [...todosOsCarros].sort((a, b) => limparValor(b.margem) - limparValor(a.margem));
            renderizarCards(ordenadosPuraMargem);
        }

        function marcarBotaoAtivo(botaoAlvo) {
            document.querySelectorAll('.btn-filtro').forEach(btn => btn.classList.remove('active'));
            botaoAlvo.classList.add('active');
        }

        carregarEstoque();
    </script>
</body>
</html>
