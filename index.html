<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ariel Unidas Atacado | Estoque de Veículos</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Ícones do Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            background-color: #f8f9fa; 
            font-family: 'Inter', sans-serif; 
            color: #212529;
        }
        
        /* Cabeçalho Premium */
        .header-premium {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-bottom: 4px solid #3b82f6;
            padding: 2rem 0;
        }
        .header-title {
            font-weight: 800;
            letter-spacing: -1px;
            color: #ffffff;
            text-transform: uppercase;
            font-size: 2rem;
        }
        @media (min-width: 768px) {
            .header-premium { padding: 2.5rem 0; }
            .header-title { font-size: 2.5rem; }
        }
        .btn-whatsapp-header {
            background-color: #25d366;
            color: white;
            font-weight: 600;
            border-radius: 50px;
            padding: 8px 24px;
            transition: all 0.3s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.3);
        }
        .btn-whatsapp-header:hover {
            background-color: #20ba59;
            color: white;
            transform: translateY(-2px);
        }

        /* Seção de Filtros */
        .card-filtros {
            background: #ffffff;
            border-radius: 16px;
            border: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.04);
            margin-top: -20px;
            z-index: 10;
            position: relative;
        }
        .btn-filtro {
            border-radius: 10px;
            padding: 6px 14px;
            font-weight: 600;
            font-size: 0.85rem;
            margin: 3px;
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
            background-color: #f8fafc;
            color: #64748b;
        }
        @media (min-width: 768px) {
            .btn-filtro { padding: 8px 20px; font-size: 0.9rem; margin: 4px; }
        }
        .btn-filtro:hover {
            background-color: #f1f5f9;
            color: #334155;
        }
        .btn-filtro.active {
            background-color: #3b82f6!important;
            color: white!important;
            border-color: #3b82f6!important;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        /* Botão de Destaque para Ordenação de Margem */
        .btn-filtro.btn-margem-toggle.active-margem {
            background-color: #10b981!important;
            color: white!important;
            border-color: #10b981!important;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        /* Grid Otimizado para Celular (2 colunas) */
        .grid-estoque {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        @media (min-width: 768px) {
            .grid-estoque {
                grid-template-columns: repeat(2, 1fr);
                gap: 24px;
            }
        }
        @media (min-width: 992px) {
            .grid-estoque {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Cards dos Carros Compactos e Quadrados */
        .card-carro { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: none; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #ffffff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            flex-column: min-height;
            height: 100%;
        }
        @media (min-width: 768px) {
            .card-carro { border-radius: 16px; }
        }
        .card-carro:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 12px 25px rgba(15, 23, 42, 0.12)!important; 
        }
        
        /* Foto Proporção Quadrada no Celular */
        .img-container {
            position: relative;
            width: 100%;
            padding-top: 85%; /* Deixa a imagem mais quadrada e compacta */
            background-color: #f1f5f9;
            overflow: hidden;
        }
        .img-carro { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; 
        }
        
        /* Badges Reduzidas no Celular */
        .badge-status { 
            position: absolute; 
            top: 8px; 
            left: 8px; 
            font-size: 0.65rem; 
            padding: 4px 8px; 
            border-radius: 30px; 
            font-weight: 700; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.15); 
            z-index: 2; 
        }
        .badge-novidade { 
            position: absolute; 
            top: 8px; 
            right: 8px; 
            font-size: 0.65rem; 
            padding: 4px 8px; 
            border-radius: 30px; 
            font-weight: 700; 
            background: linear-gradient(45deg, #f59e0b, #d97706);
            color: white; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.15); 
            z-index: 2; 
        }
        @media (min-width: 768px) {
            .badge-status { top: 16px; left: 16px; font-size: 0.75rem; padding: 6px 14px; }
            .badge-novidade { top: 16px; right: 16px; font-size: 0.75rem; padding: 6px 14px; }
        }
        .status-disponivel { background-color: #10b981; color: white; }
        .status-vendido { background-color: #ef4444; color: white; }
        
        .card-vendido { opacity: 0.65; }
        .card-vendido .img-carro { filter: grayscale(100%); }
        
        /* Detalhes Técnicos Adaptáveis */
        .card-corpo {
            padding: 0.75rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }
        @media (min-width: 768px) {
            .card-corpo { padding: 1.25rem; }
        }
        .car-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.3px;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }
        @media (min-width: 768px) {
            .car-title { font-size: 1.25rem; margin-bottom: 0.75rem; }
        }
        .preco-tag { 
            color: #1e3a8a; 
            font-weight: 800; 
            font-size: 1.1rem; 
            letter-spacing: -0.5px;
        }
        @media (min-width: 768px) {
            .preco-tag { font-size: 1.65rem; }
        }
        .detalhes-container {
            margin-bottom: 0.75rem;
        }
        @media (min-width: 768px) {
            .detalhes-container { margin-bottom: 1.25rem; }
        }
        .detalhe-item { 
            font-size: 0.75rem; 
            color: #475569; 
            margin-bottom: 4px; 
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        @media (min-width: 768px) {
            .detalhe-item { font-size: 0.88rem; margin-bottom: 6px; gap: 6px; }
        }
        .detalhe-item i {
            color: #94a3b8;
            font-size: 0.85rem;
        }
        @media (min-width: 768px) {
            .detalhe-item i { font-size: 1rem; }
        }
        .margem-destaque {
            background-color: #f0fdf4;
            color: #16a34a;
            padding: 1px 4px;
            border-radius: 4px;
        }
        @media (min-width: 768px) {
            .margem-destaque { padding: 2px 8px; border-radius: 6px; }
        }
        .rotulo-valor {
            font-size: 0.65rem;
            color: #64748b;
            font-weight: 700;
        }
        @media (min-width: 768px) {
            .rotulo-valor { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <!-- Cabeçalho Principal -->
    <header class="header-premium text-center">
        <div class="container px-3">
            <h1 class="header-title mb-1">Ariel Unidas Atacado</h1>
            <p class="text-muted mb-3 fw-medium small">Repasse e Estoque de Veículos em Tempo Real</p>
            <a href="https://wa.me/5551986597751" target="_blank" class="btn-whatsapp-header btn-sm">
                <i class="bi bi-whatsapp"></i> (51) 98659-7751
            </a>
        </div>
    </header>

    <!-- Seção de Filtros Combinados -->
    <div class="container mb-4">
        <div class="card card-filtros p-2 p-md-3 border-0">
            <div class="d-flex flex-wrap justify-content-center justify-content-md-start align-items-center">
                <button id="btn-cat-todos" class="btn btn-filtro active" onclick="filtrarCategoria('todos', this)">📊 Todos</button>
                <button id="btn-cat-novidades" class="btn btn-filtro" onclick="filtrarCategoria('novidades', this)">✨ Novidades</button>
                <div class="vr mx-1 mx-md-2 my-1" style="height: 25px; background-color: #cbd5e1;"></div>
                <button id="btn-cat-hatch" class="btn btn-filtro" onclick="filtrarCategoria('hatch', this)">🚗 Hatch</button>
                <button id="btn-cat-sedan" class="btn btn-filtro" onclick="filtrarCategoria('sedan', this)">🚘 Sedan</button>
                <button id="btn-cat-suv" class="btn btn-filtro" onclick="filtrarCategoria('suv', this)">🚙 SUV</button>
                <div class="vr mx-1 mx-md-2 my-1" style="height: 25px; background-color: #cbd5e1;"></div>
                <button id="btn-filtro-margem" class="btn btn-filtro btn-margem-toggle" onclick="toggleOrdenacaoMargem(this)">💰 Melhor Margem</button>
            </div>
        </div>
    </div>

    <!-- Grid de Veículos Otimizado -->
    <div class="container mb-5">
        <div id="lista-carros" class="grid-estoque">
            <div class="text-center grid-span-all w-100 my-5" style="grid-column: 1 / -1;">
                <div class="spinner-border text-primary" role="status"></div>
                <h4 class="mt-3 text-muted">Acessando banco de dados seguro...</h4>
            </div>
        </div>
    </div>

    <script>
        const urlPlanilha = 'https://docs.google.com/spreadsheets/d/1xzN1JBC-5Li7csrGOTDq_wADj0AOAafVfCtVYeo99eI/export?format=csv&gid=0';
        let todosOsCarros = []; 
        let categoriaAtiva = 'todos';
        let ordenarPorMargemAtivo = false;

        function identificarCarroceria(modelo) {
            const mod = modelo.toLowerCase();
            const hatches = ['onix', 'gol', 'hb20', 'uno', 'palio', 'sandero', 'ka', 'argo', 'polo', 'mobi', 'up', 'fiesta', 'fox', 'clio', 'c3', '208'];
            const sedans = ['corolla', 'civic', 'prisma', 'sentra', 'cronos', 'logan', 'virtus', 'voyage', 'city', 'versa', 'siena', 'etios', 'cruze', 'jetta'];
            const suvs = ['compass', 'creta', 'renegade', 'kicks', 'tracker', 'hr-v', 'duster', 't-cross', 'nivus', 'pulse', 'fastback', 'ix35', 'sportage', 'asx', 'captur'];

            if (hatches.some(h => mod.includes(h))) return 'hatch';
            if (sedans.some(s => mod.includes(s))) return 'sedan';
            if (suvs.some(suv => mod.includes(suv))) return 'suv';
            return 'outros';
        }

        async function carregarEstoque() {
            try {
                const resposta = await fetch(urlPlanilha + '&nocache=' + new Date().getTime());
                if (!resposta.ok) throw new Error();
                
                const textoCsv = await resposta.text();
                const linhas = textoCsv.split(/\r?\n/).map(linha => lineSplitter(linha));
                
                if (linhas.length > 0) linhas.shift(); 
                
                let disponiveis = [];
                let vendidos = [];

                linhas.forEach(linha => {
                    if (!linha || linha.length < 2 || !linha[1] || linha[1] === "") return; 

                    const textoStatusColunaH = linha[7] ? linha[7].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : 'disponivel';
                    const textoColunaI = linha[8] ? linha[8].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : '';
                    const ehNovidade = textoStatusColunaH.includes('novidade') || textoColunaI.includes('novidade');

                    const carro = {
                        placa: linha[0] ? '*****' + linha[0].trim().slice(-2) : 'N/I',
                        modelo: engineTratarModelo(linha[1]),
                        cor: linha[2] || 'Não informada',
                        km: AppendingKM(linha[3]),
                        fipe: linha[4] || 'N/A',
                        valor: linha[5] || 'Consulte',
                        margem: linha[6] || 'N/I',
                        status: textoStatusColunaH,
                        foto: (linha[8] && linha[8].includes('drive.google.com')) 
                            ? 'https://lh3.googleusercontent.com/d/' + (linha[8].includes('id=') ? linha[8].split('id=')[1].split('&')[0] : linha[8].split('/d/')[1].split('/')[0])
                            : (linha[8] || ''),
                        carroceria: identificarCarroceria(linha[1]),
                        novidade: ehNovidade
                    };

                    if (carro.status.includes('vendido')) {
                        vendidos.push(carro);
                    } else {
                        disponiveis.push(carro);
                    }
                });

                todosOsCarros = [...disponiveis, ...vendidos];
                processarEExibirEstoque();

            } catch (erro) {
                document.getElementById('lista-carros').innerHTML = `
                    <div class="text-center w-100 my-5 text-danger" style="grid-column: 1 / -1;">
                        <i class="bi bi-exclamation-triangle display-4"></i>
                        <h3 class="mt-3">Erro ao conectar com a planilha</h3>
                    </div>`;
            }
        }

        function lineSplitter(linha) {
            return linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(campo => campo.replace(/^"|"$/g, '').trim());
        }

        function engineTratarModelo(txt) {
            if(!txt) return 'N/I';
            return txt.replace(/novidade/i, '').replace(/hatch/i, '').replace(/sedan/i, '').replace(/suv/i, '').trim();
        }

        function AppendingKM(valor) {
            if(!valor || valor === 'N/I') return 'N/I';
            if(String(valor).toLowerCase().includes('km')) return valor;
            return valor + ' KM';
        }

        // Nova inteligência que filtra E ordena ao mesmo tempo
        function processarEExibirEstoque() {
            let listaFiltrada = [...todosOsCarros];

            // 1. Aplica o filtro de categoria escolhido
            if (categoriaAtiva === 'novidades') {
                listaFiltrada = listaFiltrada.filter(c => c.novidade && !c.status.includes('vendido'));
            } else if (categoriaAtiva !== 'todos') {
                listaFiltrada = listaFiltrada.filter(c => c.carroceria === categoriaAtiva);
            }

            // 2. Se o botão "Melhor Margem" estiver ligado, faz a ordenação
            if (ordenarPorMargemAtivo) {
                const limparValor = (texto) => {
                    if (!texto || texto === 'N/I') return 0;
                    let limpo = texto.replace(/[^\d,.-]/g, '').replace(/\./g, '').replace(',', '.');
                    return parseFloat(limpo) || 0;
                };
                listaFiltrada.sort((a, b) => limparValor(b.margem) - limparValor(a.margem));
            }

            renderizarCards(listaFiltrada);
        }

        function filtrarCategoria(categoria, botao) {
            categoriaAtiva = categoria;
            // Trata a marcação visual dos botões de categoria
            document.querySelectorAll('.btn-filtro:not(.btn-margem-toggle)').forEach(btn => btn.classList.remove('active'));
            botao.classList.add('active');
            
            processarEExibirEstoque();
        }

        function toggleOrdenacaoMargem(botao) {
            ordenarPorMargemAtivo = !ordenarPorMargemAtivo; // Inverte o estado (liga/desliga)
            
            if (ordenarPorMargemAtivo) {
                botao.classList.add('active-margem');
            } else {
                botao.classList.remove('active-margem');
            }
            
            processarEExibirEstoque();
        }

        function renderizarCards(lista) {
            const container = document.getElementById('lista-carros');
            container.innerHTML = '';

            if(lista.length === 0) {
                container.innerHTML = '<div class="text-center w-100 my-5 text-muted" style="grid-column: 1 / -1;"><i class="bi bi-search display-5"></i><h4 class="mt-2">Nenhum veículo encontrado.</h4></div>';
                return;
            }

            lista.forEach(carro => {
                const esVendido = carro.status.includes('vendido');
                const classeStatus = esVendido ? 'status-vendido' : 'status-disponivel';
                const classeCard = esVendido ? 'card-vendido' : '';
                const textoStatus = esVendido ? 'VENDIDO' : 'DISPONÍVEL';
                
                const fotoUrl = (carro.foto && carro.foto.startsWith('http')) ? carro.foto : 'https://placehold.co/600x400/0f172a/ffffff?text=' + encodeURIComponent(carro.modelo.split(' ')[0]);
                const badgeNovidadeHtml = (carro.novidade && !esVendido) ? `<span class="badge badge-novidade"><i class="bi bi-stars"></i> NOVIDADE</span>` : '';

                const cardHtml = `
                    <div class="col-span-item">
                        <div class="card card-carro ${classeCard}">
                            <div class="position-relative w-100">
                                <span class="badge badge-status ${classeStatus}">${textoStatus}</span>
                                ${badgeNovidadeHtml}
                                <div class="img-container">
                                    <img src="${fotoUrl}" class="img-carro" alt="${carro.modelo}">
                                </div>
                            </div>
                            <div class="card-corpo">
                                <div>
                                    <h5 class="car-title text-truncate" title="${carro.modelo}">${carro.modelo}</h5>
                                    <div class="detalhes-container">
                                        <div class="detalhe-item"><i class="bi bi-hash"></i> <span>Placa: <strong>${carro.placa}</strong></span></div>
                                        <div class="detalhe-item"><i class="bi bi-palette"></i> <span>Cor: <strong>${carro.cor}</strong></span></div>
                                        <div class="detalhe-item"><i class="bi bi-speedometer2"></i> <span>KM: <strong>${carro.km}</strong></span></div>
                                        <div class="detalhe-item"><i class="bi bi-graph-up-arrow"></i> <span>Margem: <span class="margem-destaque fw-bold">${carro.margem}</span></span></div>
                                        <div class="detalhe-item"><i class="bi bi-file-text"></i> <span class="text-muted">FIPE: ${carro.fipe}</span></div>
                                    </div>
                                </div>
                                <div class="border-top pt-2 d-flex flex-column align-items-start">
                                    <span class="rotulo-valor">VALOR REPASSE</span>
                                    <span class="preco-tag">${carro.valor}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        carregarEstoque();
    </script>
</body>
</html>
