<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ariel Unidas Atacado | Estoque de Veículos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border-bottom: 4px solid #3b82f6; }
        .card-carro { transition: transform 0.3s, box-shadow 0.3s; border: none; border-radius: 12px; overflow: hidden; min-height: 100%; background: #ffffff; }
        .card-carro:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.15)!important; }
        .img-carro { height: 180px; object-fit: cover; background-color: #e9ecef; width: 100%; }
        @media (min-width: 768px) { .img-carro { height: 200px; } }
        .badge-status { position: absolute; top: 10px; left: 10px; font-size: 0.75rem; padding: 4px 8px; border-radius: 20px; font-weight: 600; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 2; }
        .badge-novidade { position: absolute; top: 10px; right: 10px; font-size: 0.75rem; padding: 4px 8px; border-radius: 20px; font-weight: 600; background-color: #ff9f1c; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 2; }
        @media (min-width: 768px) {
            .badge-status { top: 15px; left: 15px; font-size: 0.85rem; padding: 6px 12px; }
            .badge-novidade { top: 15px; right: 15px; font-size: 0.85rem; padding: 6px 12px; }
        }
        .status-disponivel { background-color: #2ec4b6; color: white; }
        .status-vendido { background-color: #e71d36; color: white; }
        .card-vendido { opacity: 0.60; }
        .card-vendido .img-carro { filter: grayscale(100%); }
        .preco-tag { color: #2a5298; font-weight: 700; font-size: 1.1rem; }
        @media (min-width: 768px) { .preco-tag { font-size: 1.6rem; } }
        .detalhe-item { font-size: 0.8rem; color: #6c757d; margin-bottom: 3px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        @media (min-width: 768px) { .detalhe-item { font-size: 0.9rem; } }
        .btn-filtro { border-radius: 20px; padding: 6px 14px; font-weight: 500; margin: 3px; transition: all 0.2s; font-size: 0.85rem; }
        @media (min-width: 768px) { .btn-filtro { padding: 6px 18px; margin: 4px; font-size: 1rem; } }
        .btn-filtro.active { background-color: #1e3c72!important; color: white!important; border-color: #1e3c72!important; }
        .btn-filtro.btn-margem-toggle.active-margem { background-color: #198754!important; color: white!important; border-color: #198754!important; }
        .btn-whatsapp-header { background-color: #25d366; color: white; font-weight: 600; border-radius: 50px; padding: 6px 18px; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; font-size: 0.9rem; }
        .btn-whatsapp-header:hover { background-color: #20ba59; color: white; }
        .card-title { font-size: 1rem; }
        @media (min-width: 768px) { .card-title { font-size: 1.25rem; } }
    </style>
</head>
<body>

    <!-- Topo do Site -->
    <nav class="navbar navbar-dark shadow mb-4 py-3">
        <div class="container text-center">
            <span class="navbar-brand mb-1 h1 w-100 fs-2 fw-bold text-white">ARIEL UNIDAS ATACADO</span>
            <div class="w-100 mb-2 text-white-50 small">Repasse e Estoque de Veículos em Tempo Real</div>
            <div class="w-100">
                <a href="https://wa.me/5551986597751" target="_blank" class="btn-whatsapp-header">
                    <i class="bi bi-whatsapp"></i> (51) 98659-7751
                </a>
            </div>
        </div>
    </nav>

    <!-- Filtros Integrados -->
    <div class="container mb-4">
        <div class="card p-3 shadow-sm border-0 bg-white rounded-3">
            <div class="d-flex flex-wrap justify-content-center justify-content-md-start align-items-center">
                <button class="btn btn-outline-secondary btn-filtro active" onclick="filtrarCategoria('todos', this)">Todos</button>
                <button class="btn btn-outline-warning btn-filtro" onclick="filtrarCategoria('novidades', this)">✨ Novidades</button>
                <div class="vr mx-2 my-1" style="height: 25px;"></div>
                <button class="btn btn-outline-primary btn-filtro" onclick="filtrarCategoria('hatch', this)">Hatch</button>
                <button class="btn btn-outline-primary btn-filtro" onclick="filtrarCategoria('sedan', this)">Sedan</button>
                <button class="btn btn-outline-primary btn-filtro" onclick="filtrarCategoria('suv', this)">SUV</button>
                <div class="vr mx-2 my-1"></div>
                <button class="btn btn-outline-success btn-filtro btn-margem-toggle" onclick="toggleMargem(this)">💰 Melhor Margem</button>
            </div>
        </div>
    </div>

    <!-- Grid Original do Bootstrap (Ajustado para 2 colunas no celular e 3 no PC) -->
    <div class="container mb-5">
        <div id="lista-carros" class="row row-cols-2 row-cols-md-2 row-cols-lg-3 g-2 g-md-4">
            <div class="text-center w-100 my-5" style="grid-column: 1/-1;">
                <div class="spinner-border text-primary" role="status"></div>
                <h4 class="mt-3 text-muted">Buscando veículos na planilha...</h4>
            </div>
        </div>
    </div>

    <script>
        const urlPlanilha = 'https://docs.google.com/spreadsheets/d/1xzN1JBC-5Li7csrGOTDq_wADj0AOAafVfCtVYeo99eI/export?format=csv&gid=0';
        let todosOsCarros = []; 
        let categoriaAtiva = 'todos';
        let ordenarPorMargemAtivo = false;

        function identificarCarroceria(modelo) {
            const mod = modelo.toLowerCase();
            const hatches = ['onix', 'gol', 'hb20', 'uno', 'palio', 'sandero', 'ka', 'argo', 'polo', 'mobi', 'up', 'fiesta', 'fox', 'clio', 'c3', '208'];
            const sedans = ['corolla', 'civic', 'prisma', 'sentra', 'cronos', 'logan', 'virtus', 'voyage', 'city', 'versa', 'siena', 'etios', 'cruze', 'jetta'];
            const suvs = ['compass', 'creta', 'renegade', 'kicks', 'tracker', 'hr-v', 'duster', 't-cross', 'nivus', 'pulse', 'fastback', 'ix35', 'sportage', 'asx', 'captur'];

            if (hatches.some(h => mod.includes(h))) return 'hatch';
            if (sedans.some(s => mod.includes(s))) return 'sedan';
            if (suvs.some(suv => mod.includes(suv))) return 'suv';
            return 'outros';
        }

        async function carregarEstoque() {
            try {
                const resposta = await fetch(urlPlanilha + '&nocache=' + new Date().getTime());
                if (!resposta.ok) throw new Error();
                
                const textoCsv = await resposta.text();
                const linhas = textoCsv.split(/\r?\n/).map(linha => {
                    return linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(campo => campo.replace(/^"|"$/g, '').trim());
                });
                
                if (linhas.length > 0) linhas.shift(); 
                
                let disponiveis = [];
                let vendidos = [];

                linhas.forEach(linha => {
                    if (!linha || linha.length < 2 || !linha[1] || linha[1] === "") return; 

                    const textoStatusColunaH = linha[7] ? linha[7].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : 'disponivel';
                    const textoColunaI = linha[8] ? linha[8].toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") : '';
                    const ehNovidade = textoStatusColunaH.includes('novidade') || textoColunaI.includes('novidade');

                    const carro = {
                        placa: linha[0] ? '*****' + linha[0].trim().slice(-2) : 'N/I',
                        modelo: linha[1].replace(/novidade/i, '').replace(/hatch/i, '').replace(/sedan/i, '').replace(/suv/i, '').trim(),
                        cor: AppendingCor(linha[2]),
                        km: AppendingKM(linha[3]),
                        fipe: linha[4] || 'N/A',
                        valor: linha[5] || 'Consulte',
                        margem: linha[6] || 'N/I',
                        status: textoStatusColunaH,
                        foto: (linha[8] && linha[8].includes('drive.google.com')) 
                            ? 'https://lh3.googleusercontent.com/d/' + (linha[8].includes('id=') ? linha[8].split('id=')[1].split('&')[0] : linha[8].split('/d/')[1].split('/')[0])
                            : (linha[8] || ''),
                        carroceria: identificarCarroceria(linha[1]),
                        novidade: ehNovidade
                    };

                    if (carro.status.includes('vendido')) {
                        vendidos.push(carro);
                    } else {
                        disponiveis.push(carro);
                    }
                });

                todosOsCarros = [...disponiveis, ...vendidos];
                processarEstoque();

            } catch (erro) {
                document.getElementById('lista-carros').innerHTML = '<div class="text-center w-100 my-5 text-danger"><h3>⚠️ Erro ao carregar o estoque</h3></div>';
            }
        }

        function AppendingKM(valor) {
            if(!valor || valor === 'N/I') return 'N/I';
            if(String(valor).toLowerCase().includes('km')) return valor;
            return valor + ' KM';
        }
        
        function AppendingCor(valor) {
            if(!valor) return 'Não informada';
            return valor;
        }

        function processarEstoque() {
            let listaFiltrada = [...todosOsCarros];

            if (categoriaAtiva === 'novidades') {
                listaFiltrada = listaFiltrada.filter(c => c.novidade && !c.status.includes('vendido'));
            } else if (categoriaAtiva !== 'todos') {
                listaFiltrada = listaFiltrada.filter(c => c.carroceria === categoriaAtiva);
            }

            if (ordenarPorMargemAtivo) {
                const limparValor = (texto) => {
                    if (!texto || texto === 'N/I') return 0;
                    let limpo = texto.replace(/[^\d,.-]/g, '').replace(/\./g, '').replace(',', '.');
                    return parseFloat(limpo) || 0;
                };
                listaFiltrada.sort((a, b) => limparValor(b.margem) - limparValor(a.margem));
            }

            renderizarCards(listaFiltrada);
        }

        function filtrarCategoria(cat, botao) {
            categoriaAtiva = cat;
            document.querySelectorAll('.btn-filtro:not(.btn-margem-toggle)').forEach(btn => btn.classList.remove('active'));
            botao.classList.add('active');
            processarEstoque();
        }

        function toggleMargem(botao) {
            ordenarPorMargemAtivo = !ordenarPorMargemAtivo;
            if (ordenarPorMargemAtivo) {
                botao.classList.add('active-margem');
            } else {
                botao.classList.remove('active-margem');
            }
            processarEstoque();
        }

        function renderizarCards(lista) {
            const container = document.getElementById('lista-carros');
            container.innerHTML = '';

            if(lista.length === 0) {
                container.innerHTML = '<div class="text-center w-100 my-5 text-muted"><h3>Nenhum veículo encontrado.</h3></div>';
                return;
            }

            lista.forEach(carro => {
                const esVendido = carro.status.includes('vendido');
                const classeStatus = esVendido ? 'status-vendido' : 'status-disponivel';
                const classeCard = esVendido ? 'card-vendido' : '';
                const textoStatus = esVendido ? 'VENDIDO' : 'DISPONÍVEL';
                
                const fotoUrl = carro.foto.startsWith('http') ? carro.foto : 'https://placehold.co/600x400/1e3c72/ffffff?text=' + encodeURIComponent(carro.modelo.split(' ')[0]);
                const badgeNovidadeHtml = (carro.novidade && !esVendido) ? `<span class="badge badge-novidade">✨ NOVIDADE</span>` : '';

                const cardHtml = `
                    <div class="col">
                        <div class="card card-carro shadow-sm ${classeCard} position-relative">
                            <span class="badge badge-status ${classeStatus}">${textoStatus}</span>
                            ${badgeNovidadeHtml}
                            <img src="${fotoUrl}" class="card-img-top img-carro" alt="${carro.modelo}">
                            <div class="card-body p-2 p-md-3 d-flex flex-column justify-content-between">
                                <div>
                                    <h5 class="card-title text-dark fw-bold mb-2 text-truncate" title="${carro.modelo}">${carro.modelo}</h5>
                                    <div class="mb-2">
                                        <div class="detalhe-item"><strong>Placa:</strong> ${carro.placa}</div>
                                        <div class="detalhe-item text-truncate"><strong>Cor:</strong> ${carro.cor}</div>
                                        <div class="detalhe-item"><strong>KM:</strong> ${carro.km}</div>
                                        <div class="detalhe-item"><strong>Margem:</strong> <span class="text-success fw-bold">${carro.margem}</span></div>
                                        <div class="detalhe-item text-muted text-truncate"><small>FIPE: ${carro.fipe}</small></div>
                                    </div>
                                </div>
                                <div class="border-top pt-2 mt-1 d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center">
                                    <span class="small text-muted fw-bold" style="font-size:0.7rem;">REPASSE:</span>
                                    <span class="preco-tag">${carro.valor}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        carregarEstoque();
    </script>
</body>
</html>
